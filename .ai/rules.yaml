version: 1

project:
  name: auto-trading
  description: >
    Low-latency auto-trading system with microservices (Rust + Python),
    Redpanda/Kafka messaging, Timescale/Postgres as OMS source of truth,
    Redis for ephemeral state, optional ClickHouse analytics, and a Next.js dashboard.

goals:
  - Keep hot-path messaging binary (Protobuf). Avoid JSON in hot-path topics.
  - Ensure OMS loop is idempotent, traceable, and persisted to Postgres for web history.
  - Maintain strict separation of concerns across services and shared libs.
  - Prefer deterministic, testable logic; use feature flags/config not hardcoded constants.
  - Optimize for reliability and operability (health/readiness, metrics, tracing).

repo_structure:
  canonical_compose: "docker-compose.yml"
  legacy_compose_paths:
    - "infra/docker/docker-compose.yml"
  infra_dir: "infra"
  docs_dir: "docs"
  db_dir: "db"
  proto_dir: "proto"
  rust_libs_dir: "libs/rust"
  python_libs_dir: "libs/python"
  services_dir: "services"
  web_app_dir: "apps/web_dashboard"
  placement_rules:
    - "All database schema, migration, and SQL query files must be created/updated under db/ (for example: db/postgres, db/clickhouse, db/queries)."
    - "All infrastructure YAML and infra-related files must be created/updated under infra/ (for example: infra/docker, infra/scripts, infra/k8s)."

architecture_rules:
  separation_of_concerns:
    marketdata_ingestor:
      path: "services/marketdata_ingestor"
      responsibilities:
        - Open exchange WebSocket connections
        - Normalize raw market events
        - Publish to MQ (no computations)
      forbidden:
        - Technical indicator computation
        - Risk/strategy logic
    feature_engine:
      path: "services/feature_engine"
      responsibilities:
        - Consume raw market events
        - Maintain per-symbol in-memory state
        - Compute indicators incrementally
        - Publish feature vectors
      forbidden:
        - Placing orders
        - Risk approval logic
    ai_predictor:
      path: "services/ai_predictor"
      responsibilities:
        - Consume features
        - Run inference
        - Publish predictions with model_version
      forbidden:
        - Risk sizing / order placement
    strategy_engine:
      path: "services/strategy_engine"
      responsibilities:
        - Consume features + predictions + execution reports
        - Apply hard gates (staleness/confidence/liquidity)
        - Create order commands with idempotency keys
        - Write decision logs (optional)
      forbidden:
        - Direct exchange REST calls
    execution_router:
      path: "services/execution_router"
      responsibilities:
        - Consume order commands
        - Execute orders (paper or exchange)
        - Emit execution reports
        - Persist OMS state to Postgres (source of truth for web)
      forbidden:
        - Strategy indicator rules
        - Model inference
    api_gateway:
      path: "services/api_gateway"
      responsibilities:
        - Serve REST for dashboard
        - Read Postgres OMS tables
        - Provide control-plane endpoints (configs/kill switch)
      forbidden:
        - Consuming hot-path topics for business decisions

data_plane_rules:
  messaging:
    mq: "Redpanda/Kafka"
    serialization:
      hot_path_required: "protobuf"
      forbidden_in_hot_path:
        - "json"
    topic_naming:
      preferred_domains:
        - "md.*"
        - "ai.*"
        - "orders.*"
        - "control.*"
        - "system.*"
        - "dlq.*"
      current_compatibility:
        allowed_prefixes:
          - "TOPIC_"
    partitioning:
      market_topics_key: "symbol"
      oms_topics_key: "account_id:symbol"
  idempotency:
    required_fields:
      - "trace_id"
      - "client_order_id"
    policies:
      - "At-least-once consumption must not cause duplicate DB rows."
      - "Execution router must deduplicate on client_order_id."
      - "Fills must have a unique key (exchange_trade_id or client_order_id+fill_seq)."

storage_rules:
  postgres_timescale:
    role: "OMS source of truth + state"
    required_tables:
      - "orders"
      - "order_events"
      - "fills"
      - "positions"
      - "decision_logs"
    requirements:
      - "Unique constraint on orders.client_order_id"
      - "Indices for list/detail queries"
      - "Migrations live in db/postgres/*.sql"
  redis:
    role: "ephemeral state"
    requirements:
      - "All keys must have TTL unless explicitly permanent"
      - "Kill switch key must be checked in risk_guard/strategy as configured"
  clickhouse:
    role: "optional analytics"
    policy: "Must not be a hard dependency for OMS P0. Analytics services may depend on it."

rust_libs_rules:
  libs:
    hft_common:
      responsibilities:
        - "config parsing"
        - "logging/tracing setup"
        - "otel helpers"
        - "time and id helpers"
      must_include:
        - "config.rs"
        - "logging.rs"
        - "otel.rs"
        - "ids.rs"
        - "time.rs"
        - "error.rs"
    hft_proto:
      responsibilities:
        - "prost generated types"
        - "encode/decode helpers"
        - "schema/version constants"
      must_include:
        - "build.rs"
        - "encode.rs"
        - "generated/mod.rs"
    hft_mq:
      responsibilities:
        - "rdkafka producer/consumer wrappers"
        - "commit strategy"
        - "dlq helper"
      requirements:
        - "manual commit after successful processing"
        - "bounded concurrency/backpressure"
    hft_store:
      responsibilities:
        - "Postgres pool"
        - "repository layer for OMS tables"
        - "migrations runner"
    hft_redis:
      responsibilities:
        - "Redis client wrapper"
        - "key naming helpers"
        - "rate limit + ttl helpers"
    hft_exchange:
      responsibilities:
        - "exchange adapter (binance)"
        - "signer + user stream"
      policy: "Only execution_router may depend on this crate in production."
    hft_risk:
      responsibilities:
        - "pure risk gates"
        - "position sizing helpers"
        - "limit checks"
      requirements:
        - "functions return { pass, reason, note? } semantics"

coding_standards:
  rust:
    edition: "2024"
    patterns:
      - "small functions, single responsibility"
      - "no hardcoded values in logic; use config"
      - "structured logs with key metrics"
      - "explicit error context (anyhow/thiserror)"
      - "avoid allocations in hot paths where possible"
      - "prefer incremental O(1) indicator updates"
  python:
    patterns:
      - "FastAPI for control endpoints"
      - "separate consumer loop from HTTP server"
      - "typed configs, clear error handling"
      - "publish neutral prediction on model failure"
  web:
    patterns:
      - "dashboard reads from api_gateway only"
      - "no direct Kafka reads from UI"
      - "pagination + filters required for list endpoints"

testing_rules:
  required_tests:
    - name: "OMS E2E verification"
      path: "tests/verify_oms_loop.py"
      must_assert:
        - "order created"
        - "events timeline exists"
        - "fills exist"
        - "no duplicates on replay"
  required_manual_checks:
    - "docker compose up stable"
    - "topics exist + configs correct"
    - "web orders list + detail renders"
    - "kill switch rejects new orders"
    - "trace_id searchable across services"

operability_rules:
  health:
    required_endpoints:
      - "/health"
      - "/ready"
    readiness_conditions:
      - "MQ connected"
      - "DB reachable if service writes/reads DB"
      - "Redis reachable if used"
  observability:
    tracing:
      required: true
      propagation: "trace_id must be preserved in MQ messages and persisted in DB"
    metrics:
      minimum:
        - "processed_messages_total"
        - "rejects_total_by_reason"
        - "db_write_latency_ms"
        - "consumer_lag (if available)"

workflow:
  preferred_execution_order:
    - "Align compose + topics"
    - "Run migrations"
    - "Start OMS services"
    - "Run tests/verify_oms_loop.py"
    - "Open web dashboard and verify orders history"
  change_policy:
    - "Any topic rename must update: docs/topics.md, infra/scripts/create_topics.sh, docker-compose envs, and tests."
    - "Any schema change must update proto files and regenerate libs/python/hft_proto and libs/rust/hft_proto."

notes:
  - "This rules file is intended for AI assistants and automation tools operating on the repo."
  - "P0 assumes ClickHouse is optional; do not make core services depend on ClickHouse readiness."
