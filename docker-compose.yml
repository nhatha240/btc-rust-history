name: auto-trading

services:
  # ===================== Messaging (Redpanda) =====================
  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - http://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - http://redpanda:8082
      - --schema-registry-addr
      - http://0.0.0.0:8081
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --default-log-level=info
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - "9092:9092"     # Kafka (outside)
      - "9644:9644"     # Admin API
      - "8081:8081"     # Schema Registry
      - "8082:8082"     # Pandaproxy
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - trading
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9644/v1/status/ready >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 20s

  redpanda-console:
    image: redpandadata/console:latest
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMAREGISTRY_ENABLED: "true"
      SCHEMAREGISTRY_URL: http://redpanda:8081
      CONNECT_ENABLED: "false"
      REDPANDA_ADMIN_API: http://redpanda:9644
    ports:
      - "8085:8085"  # UI: http://localhost:8085
    networks:
      - trading

  # ===================== Storage & Cache =====================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    environment:
      CLICKHOUSE_DB: db_trading
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - trading
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:8123/ping | grep -q 'Ok'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ===================== App Layer (Rust workspace) =====================
  web:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: web }
    image: btc-rust-web:latest
    environment:
      WEB_PORT: "8080"
      CLICKHOUSE_DSN: "http://clickhouse:8123"
    ports: [ "8080:8080" ]
    networks:
      - trading
    depends_on:
      clickhouse:
        condition: service_healthy

  feature_state:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: feature_state }
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_CANDLES_1M: TOPIC_CANDLES_1M
      KAFKA_TOPIC_FEATURE_STATE: TOPIC_FEATURE_STATE
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: db_trading
      REDIS_URL: redis://redis:6379/0
    networks:
      - trading

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: ingestion }
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_CANDLES_1M: TOPIC_CANDLES_1M
      SYMBOLS: BTCUSDT,ETHUSDT
      INTERVAL: 1m
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      CH_URL: http://clickhouse:8123
      CH_DB: db_trading
      CH_USER: default
      CH_PASSWORD: ''
    networks:
      - trading

  mc_snapshot:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: mc_snapshot }
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_MC_SNAPSHOT: TOPIC_MC_SNAPSHOT
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: db_trading
    networks:
      - trading

  signal_engine:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: signal_engine }
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_FEATURE_STATE: TOPIC_FEATURE_STATE
      KAFKA_TOPIC_SIGNALS: TOPIC_SIGNALS
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: db_trading
      REDIS_URL: redis://redis:6379/0
    networks:
      - trading

networks:
  trading:
    driver: bridge

volumes:
  redpanda_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
