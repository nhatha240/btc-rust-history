name: auto-trading

services:
  # ===================== Messaging (Redpanda) =====================
  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda start
      - --mode
      - dev-container
      - --overprovisioned
      - --memory
      - 1G
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:29092
      - --pandaproxy-addr
      - http://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - http://redpanda:8082
      - --schema-registry-addr
      - internal://0.0.0.0:8081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --default-log-level=info
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - "9092:9092" # Internal Kafka (bridge if needed, but primarily 9092 is standard)
      - "29092:29092" # External Kafka (Host access)
      - "9644:9644" # Admin API
      - "8081:8081" # Schema Registry
      - "8082:8082" # Pandaproxy
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9644/v1/status/ready | grep -q ready" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  redpanda-console:
    image: redpandadata/console:latest
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        kafkaConnect:
          enabled: false
    ports: [ "8080:8080" ] # UI
    networks: [ trading ]

  connect:
    image: redpandadata/connect:latest
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java
    volumes:
      - ./infra/docker/connect/connect.yaml:/connect.yaml:ro
    ports: [ "8083:4195" ]
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://localhost:4195/ready >/dev/null" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  topic_init:
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda: { condition: service_healthy }
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      set -e
      rpk topic create \
        TOPIC_CANDLES_1M TOPIC_FEATURE_STATE \
        TOPIC_SIGNALS TOPIC_SIGNAL_STATE \
        TOPIC_ORDERS TOPIC_ORDERS_APPROVED \
        TOPIC_FILLS TOPIC_MC_SNAPSHOT \
        md.raw.trades md.raw.book \
        --brokers redpanda:9092 || true

      rpk topic alter-config TOPIC_CANDLES_1M   --set retention.ms=3600000   --brokers redpanda:9092 || true
      rpk topic alter-config TOPIC_SIGNALS       --set retention.ms=86400000  --brokers redpanda:9092 || true
      rpk topic alter-config TOPIC_MC_SNAPSHOT   --set retention.ms=86400000  --brokers redpanda:9092 || true
      rpk topic alter-config TOPIC_ORDERS        --set retention.ms=604800000 --brokers redpanda:9092 || true
      rpk topic alter-config TOPIC_ORDERS_APPROVED --set retention.ms=604800000 --brokers redpanda:9092 || true
      rpk topic alter-config TOPIC_FILLS         --set retention.ms=604800000 --brokers redpanda:9092 || true
      rpk topic alter-config md.raw.trades      --set retention.ms=3600000   --brokers redpanda:9092 || true
      rpk topic alter-config md.raw.book        --set retention.ms=3600000   --brokers redpanda:9092 || true

      rpk topic alter-config TOPIC_FEATURE_STATE --set cleanup.policy=compact --brokers redpanda:9092 || true
      rpk topic alter-config TOPIC_SIGNAL_STATE  --set cleanup.policy=compact --brokers redpanda:9092 || true

      echo "Topic init done."
    networks: [ trading ]

  # ===================== Storage =====================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    environment:
      CLICKHOUSE_DB: db_trading
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123" # HTTP  (all services use this)
      - "19000:9000" # Native — remapped to 19000 (port 9000 in use on host)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query='SELECT 1'" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: traderpw
    ports: [ "5432:5432" ]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/postgres:/docker-entrypoint-initdb.d:ro
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U trader -d db_trading" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports: [ "6379:6379" ]
    volumes: [ redis_data:/data ]
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep -q PONG" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  clickhouse_init2:
    image: clickhouse/clickhouse-client:latest
    depends_on:
      - clickhouse
    entrypoint: [ "/bin/sh", "-lc" ]
    command: "clickhouse-client --host clickhouse --multiquery < /ddl.sql"
    volumes:
      - ./db/clickhouse/init.sql:/ddl.sql:ro
    restart: "no"

  clickhouse_init:
    image: curlimages/curl:8.8.0
    depends_on:
      clickhouse: { condition: service_healthy }
    command: [ "-fsS", "http://clickhouse:8123/?database=db_trading", "--data-binary", "@/ddl.sql" ]
    volumes:
      - ./db/clickhouse/init.sql:/ddl.sql:ro
    networks: [ trading ]
    restart: "no"

  # ===================== Observability =====================
  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports: [ "4317:4317", "4318:4318" ]
    networks: [ trading ]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: [ "9090:9090" ]
    networks: [ trading ]

  grafana:
    image: grafana/grafana:latest
    ports: [ "3000:3000" ]
    volumes:
      - grafana_data:/var/lib/grafana
    networks: [ trading ]

  # ===================== App Layer (Rust workspace) =====================
  web:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: web }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    environment:
      WEB_PORT: "8088"
      CLICKHOUSE_DSN: "http://clickhouse:8123"
      DATABASE_URL: "postgres://trader:traderpw@postgres:5432/db_trading"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=web,env=dev
    ports: [ "8088:8088" ]
    networks: [ trading ]
    depends_on:
      - clickhouse
      - postgres

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: ingestion }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_CANDLES_1M: TOPIC_CANDLES_1M
      SYMBOLS: BTCUSDT,ETHUSDT
      INTERVAL: 1m
      BINANCE_API_KEY_FILE: /run/secrets/binance_key
      BINANCE_API_SECRET_FILE: /run/secrets/binance_secret
      CH_URL: http://clickhouse:8123
      CH_DB: db_trading
      CH_USER: default
      CH_PASSWORD: ""
      BINANCE_WS_BASE_URL: wss://stream.binance.com:9443/stream
      HEALTH_PORT: "8085"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=ingestion,env=dev
    secrets: [ binance_key, binance_secret ]
    ports:
      - "8085:8085" # Health: GET /health
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8085/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  feature_state:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: feature_engine }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_CANDLES_1M: TOPIC_CANDLES_1M
      KAFKA_TOPIC_FEATURE_STATE: TOPIC_FEATURE_STATE
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: db_trading
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=feature_state,env=dev
    networks: [ trading ]

  mc_snapshot:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: mc_snapshot }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_MC_SNAPSHOT: TOPIC_MC_SNAPSHOT
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: db_trading
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      SYMBOLS: BTCUSDT,ETHUSDT
      MC_POLL_INTERVAL_SECS: "60"
      HEALTH_PORT: "8086"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=mc_snapshot,env=dev
    ports:
      - "8086:8086" # Health: GET /health
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8086/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  signal_engine:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: signal_engine }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_FEATURE_STATE: TOPIC_FEATURE_STATE
      KAFKA_TOPIC_SIGNALS: TOPIC_SIGNALS
      KAFKA_TOPIC_SIGNAL_STATE: TOPIC_SIGNAL_STATE
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: db_trading
      REDIS_URL: redis://redis:6379/0
      # Anti-spam
      SIGNAL_EDGE_MODE: BAR_CLOSE
      SIGNAL_STABLE_MS: "2000"
      SIGNAL_HYSTERESIS_TYPE: ATR
      SIGNAL_HYSTERESIS_MULT_ENTER: "0.5"
      SIGNAL_HYSTERESIS_MULT_EXIT: "0.2"
      SIGNAL_DEBOUNCE_MS: "1000"
      SIGNAL_COOLDOWN_MS: "15000"
      SIGNAL_MAX_PER_MIN: "5"
      SIGNAL_THROTTLE_MODE: DROP
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=signal_engine,env=dev
    networks: [ trading ]

  risk_guard:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: risk_guard }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_ORDERS_IN: TOPIC_ORDERS
      KAFKA_TOPIC_ORDERS_APPROVED: TOPIC_ORDERS_APPROVED
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgres://trader:traderpw@postgres:5432/db_trading
      LIMIT_NOTIONAL_PER_SYMBOL: "5000"
      LIMIT_LEVERAGE: "5"
      KILL_SWITCH_KEY: risk:kill
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=risk_guard,env=dev
    networks: [ trading ]

  order_executor:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: order_executor }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_SIGNALS: TOPIC_SIGNALS
      KAFKA_TOPIC_ORDERS: TOPIC_ORDERS
      KAFKA_TOPIC_FILLS: TOPIC_FILLS
      REDIS_URL: redis://redis:6379/0
      EXCHANGE: binance
      BINANCE_API_KEY_FILE: /run/secrets/binance_key
      BINANCE_API_SECRET_FILE: /run/secrets/binance_secret
      DATABASE_URL: postgres://trader:traderpw@postgres:5432/db_trading
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=order_executor,env=dev
    secrets: [ binance_key, binance_secret ]
    networks: [ trading ]

  paper_trader:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: paper_trader }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_ORDERS_APPROVED: TOPIC_ORDERS_APPROVED
      KAFKA_TOPIC_FILLS: TOPIC_FILLS
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_RESOURCE_ATTRIBUTES: service.name=paper_trader,env=dev
    networks: [ trading ]

  marketdata_ingestor:
    build:
      context: .
      dockerfile: Dockerfile.rust-workspace
      args: { BIN: marketdata_ingestor }
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    restart: unless-stopped
    depends_on:
      redpanda: { condition: service_healthy }
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CLIENT_ID: marketdata-ingestor
      KAFKA_TOPIC_RAW_TRADES: md.raw.trades
      KAFKA_TOPIC_RAW_BOOK: md.raw.book
      SYMBOLS: BTCUSDT,ETHUSDT
      BINANCE_WS_BASE_URL: wss://stream.binance.com:9443/stream
      RECONNECT_BASE_MS: "500"
      RECONNECT_MAX_MS: "30000"
      HEALTH_PORT: "8084"
    ports:
      - "8084:8084" # Health: GET /health, GET /ready
    networks: [ trading ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8084/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  trading:
    driver: bridge

volumes:
  redpanda_data: {}
  clickhouse_data: {}
  redis_data: {}
  pg_data: {}
  grafana_data: {}

secrets:
  binance_key:
    file: ./secrets/binance_key.txt
  binance_secret:
    file: ./secrets/binance_secret.txt
