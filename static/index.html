<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Multi Live Chart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        html, body { margin:0; padding:0; height:100%; background:#0b0e11; color:#e0e6ed; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto }
        .wrap { display:flex; flex-direction:column; height:100%; }
        .toolbar { display:flex; gap:8px; padding:8px 10px; align-items:center; font-size:12px; color:#9ca3af; }
        #price  { height: 68vh; }
        #volume { height: 26vh; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="toolbar">
        <label>Exchange:
            <select id="exchange">
                <option value="binance_spot">binance_spot</option>
                <option value="binance_um">binance_um</option>
            </select>
        </label>
        <label>Symbol:
            <input id="symbol" value="BTCUSDT" style="width:100px;background:#111827;border:1px solid #374151;color:#e5e7eb;padding:4px 6px;border-radius:6px" />
        </label>
        <label>Interval:
            <select id="interval">
                <option>1m</option><option>5m</option><option>15m</option><option>1h</option>
            </select>
        </label>
        <button id="connect" style="background:#1f2937;border:1px solid #374151;color:#e5e7eb;padding:4px 10px;border-radius:6px;cursor:pointer">Connect</button>
        <div id="status" style="margin-left:auto;opacity:.7">idle</div>
    </div>
    <div id="price"></div>
    <div id="volume"></div>
</div>

<script>
    // ---------- Utils ----------
    const params = new URLSearchParams(location.search);
    const defExchange = params.get('exchange') || 'binance_spot';
    const defSymbol   = params.get('symbol')   || 'BTCUSDT';
    const defInterval = params.get('interval') || '1m';
    document.getElementById('exchange').value = defExchange;
    document.getElementById('symbol').value   = defSymbol;
    document.getElementById('interval').value = defInterval;

    const GRID_COLOR = '#1f2937';
    const UP_BODY = '#26a69a';
    const DOWN_BODY = '#ef5350';
    const MA7 = '#f59e0b', MA25 = '#ec4899', MA99 = '#8b5cf6', BB = '#94a3b8';
    const tsSec = (ms) => Math.floor(ms / 1000);

    // ---------- Charts ----------
    const priceChart = LightweightCharts.createChart(document.getElementById('price'), {
        layout: { background: { type:'solid', color:'#0b0e11' }, textColor:'#d1d5db' },
        rightPriceScale: { borderVisible:false, scaleMargins: { top:0.1, bottom:0.2 } },
        timeScale: { borderVisible:false, timeVisible:true, secondsVisible:true, rightOffset: 12, barSpacing: 6, lockVisibleTimeRangeOnResize: true },
        grid: { vertLines: { color: GRID_COLOR }, horzLines: { color: GRID_COLOR } },
    });
    const candleSeries = priceChart.addCandlestickSeries({ upColor:UP_BODY, downColor:DOWN_BODY, borderUpColor:UP_BODY, borderDownColor:DOWN_BODY, wickUpColor:UP_BODY, wickDownColor:DOWN_BODY });
    const ma7  = priceChart.addLineSeries({ color: MA7,  lineWidth: 2 });
    const ma25 = priceChart.addLineSeries({ color: MA25, lineWidth: 2 });
    const ma99 = priceChart.addLineSeries({ color: MA99, lineWidth: 2 });
    const bbU  = priceChart.addLineSeries({ color: BB,   lineWidth: 1 });
    const bbL  = priceChart.addLineSeries({ color: BB,   lineWidth: 1 });

    const volChart = LightweightCharts.createChart(document.getElementById('volume'), {
        layout: { background: { type:'solid', color:'#0b0e11' }, textColor:'#d1d5db' },
        rightPriceScale: { borderVisible:false, scaleMargins: { top:0.1, bottom:0.05 } },
        timeScale: { borderVisible:false, timeVisible:true, secondsVisible:true, rightOffset: 12, barSpacing: 6, lockVisibleTimeRangeOnResize: true },
        grid: { vertLines: { color: GRID_COLOR }, horzLines: { color: GRID_COLOR } },
    });
    const volHist = volChart.addHistogramSeries({ priceFormat:{type:'volume'}, priceLineVisible:false, lastValueVisible:false });
    const volMA   = volChart.addLineSeries({ lineWidth: 1, color: '#9ca3af' });

    // Sync time scales
    function sync(a, b) {
        a.timeScale().subscribeVisibleLogicalRangeChange(r => { if (r) b.timeScale().setVisibleLogicalRange(r); });
    }
    sync(priceChart, volChart); sync(volChart, priceChart);

    // ---------- Studies ----------
    const rows = [];
    function computeEMA(data, period) {
        if (!data.length) return [];
        const alpha = 2 / (period + 1); const out=[]; let ema=null, sum=0;
        for (let i=0;i<data.length;i++) {
            const p=data[i].close;
            if (ema==null) { sum+=p; if (i===period-1) { ema=sum/period; out.push({time:data[i].time,value:ema}); } }
            else { ema=alpha*p+(1-alpha)*ema; out.push({time:data[i].time,value:ema}); }
        }
        return out;
    }
    function computeSMA(data, period, acc) {
        const out=[]; let s=0;
        for (let i=0;i<data.length;i++){ s+=acc(data[i]); if(i>=period)s-=acc(data[i-period]); if(i>=period-1) out.push({time:data[i].time,value:s/period}); }
        return out;
    }
    function computeBB(data, period, k) {
        const up=[],lo=[]; let s=0,ss=0;
        for (let i=0;i<data.length;i++){
            const p=data[i].close; s+=p; ss+=p*p; if (i>=period) { const o=data[i-period].close; s-=o; ss-=o*o; }
            if (i>=period-1) { const m=s/period, v=Math.max(0,(ss/period)-m*m), sd=Math.sqrt(v); up.push({time:data[i].time,value:m+k*sd}); lo.push({time:data[i].time,value:m-k*sd}); }
        }
        return {upper:up, lower:lo};
    }

    function renderAll() {
        if (!rows.length) return;
        candleSeries.setData(rows.map(r=>({time:r.time,open:r.open,high:r.high,low:r.low,close:r.close})));
        volHist.setData(rows.map(r=>({time:r.time,value:r.volume,color:(r.close>=r.open)?'#26a69a':'#ef5350'})));
        volMA.setData(computeSMA(rows,20,x=>x.volume));
        ma7.setData(computeEMA(rows,7));
        ma25.setData(computeEMA(rows,25));
        ma99.setData(computeEMA(rows,99));
        const bb=computeBB(rows,20,2.0); bbU.setData(bb.upper); bbL.setData(bb.lower);
    }

    function normalize(x) {
        const k = x && x.candle ? x.candle : x;
        if (!k || k.t == null) return null;
        return { time: tsSec(k.t), open:k.o, high:k.h, low:k.l, close:k.c, volume:k.v };
    }

    let ws = null;
    async function connect() {
        const exchange=document.getElementById('exchange').value;
        const symbol=document.getElementById('symbol').value.trim();
        const interval=document.getElementById('interval').value;
        document.getElementById('status').textContent = `connecting ${exchange}/${symbol}/${interval}...`;

        if (ws) try { ws.close(); } catch(e) {}

        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws/${exchange}/${symbol}/${interval}`);
        ws.onopen = () => { document.getElementById('status').textContent = 'connected'; };
        ws.onerror = (e) => { document.getElementById('status').textContent = 'error'; console.error(e); };
        ws.onclose = () => { document.getElementById('status').textContent = 'closed'; };

        ws.onmessage = (evt) => {
            const msg = JSON.parse(evt.data);
            switch (msg.type) {
                case 'Snapshot': {
                    const arr = msg.data.candles.map(normalize).filter(Boolean);
                    rows.length=0; rows.push(...arr); renderAll();
                    priceChart.timeScale().fitContent(); volChart.timeScale().fitContent();
                    priceChart.timeScale().scrollToRealTime(); volChart.timeScale().scrollToRealTime();
                    break;
                }
                case 'Append': {
                    const r = normalize(msg.data.candle); if (r) { rows.push(r); renderAll(); }
                    priceChart.timeScale().scrollToRealTime(); volChart.timeScale().scrollToRealTime();
                    break;
                }
                case 'UpdateLast': {
                    const r = normalize(msg.data.candle);
                    if (r) {
                        if (rows.length && rows[rows.length-1].time === r.time) rows[rows.length-1] = r; else rows.push(r);
                        renderAll();
                        priceChart.timeScale().scrollToRealTime(); volChart.timeScale().scrollToRealTime();
                    }
                    break;
                }
            }
        };
    }

    document.getElementById('connect').addEventListener('click', connect);

    // Autoconnect with query params
    connect();
</script>
</body>
</html>
